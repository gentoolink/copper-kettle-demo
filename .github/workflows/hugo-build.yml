name: Build and Deploy Hugo Site to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'site/hugo/**'
      - 'content/**'
      - 'data/**'
      - 'sync_to_hugo.py'
      - '.github/workflows/hugo-build.yml'

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: "pages"
      cancel-in-progress: false
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.134.2'
          extended: true

      - name: Sync CMS content to Hugo
        run: python3 sync_to_hugo.py

      - name: Build Hugo site
        run: hugo --theme=the-copper-kettle --gc --minify
        working-directory: ./site/hugo

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/hugo/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
